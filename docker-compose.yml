# Запуск из корня репозитория:
#   docker compose --env-file .env up -d --build
#
# Переменные для /api/callback задайте в .env в корне (или через окружение).

services:

  astro:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thepetcare-astro
    restart: unless-stopped
    environment:
      HOST: "0.0.0.0"
      PORT: "4321"
      NODE_ENV: production
      BLOG_VIEWS_PATH: /app/data/blog-views.json
      TG_BOT_TOKEN: ${TG_BOT_TOKEN:-}
      TG_CHAT_ID: ${TG_CHAT_ID:-}
      RECAPTCHA_SECRET: ${RECAPTCHA_SECRET:-}
    volumes:
      - blog_views:/app/data
    ports:
      - "127.0.0.1:9082:4321"
    networks:
      - web

networks:
  web:
    driver: bridge
    name: thepetcare_web

volumes:
  blog_views:
