# Запуск: из каталога docker/
#   docker compose --env-file .env up -d --build
#
# Порты хоста :80/:443 этим файлом не занимаются (см. README — общий nginx на сервере).
# Локально на 127.0.0.1:9080: docker compose -f docker-compose.yml -f docker-compose.ports-local.yml up -d --build
#
# Переменные для /api/callback задайте в .env рядом с compose или через окружение.

services:

  astro:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: thepetcare-astro
    restart: unless-stopped
    environment:
      HOST: "0.0.0.0"
      PORT: "4321"
      NODE_ENV: production
      BLOG_VIEWS_PATH: /app/data/blog-views.json
      TG_BOT_TOKEN: ${TG_BOT_TOKEN:-}
      TG_CHAT_ID: ${TG_CHAT_ID:-}
      RECAPTCHA_SECRET: ${RECAPTCHA_SECRET:-}
    volumes:
      # Персистентные просмотры блога
      - blog_views:/app/data
    expose:
      - "4321"
    networks:
      - web

  nginx:
    image: nginx:1.27-alpine
    container_name: thepetcare-nginx
    restart: unless-stopped
    depends_on:
      - astro
    # Порт 80 только внутри сети compose — не конфликтует с занятым на хосте :80/:443 у другого nginx.
    expose:
      - "80"
    # Локальный проброс только для отладки (можно временно включить второй файл):
    # файл docker-compose.ports-local.yml
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - web

networks:
  web:
    driver: bridge
    name: thepetcare_web

volumes:
  blog_views:
