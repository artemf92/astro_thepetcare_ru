# Опционально: проброс внутреннего nginx стека на loopback для curl/отладки.
# Из каталога docker/:
#   docker compose -f docker-compose.yml -f docker-compose.ports-local.yml up -d --build
#
# По умолчанию 9080→80 только на 127.0.0.1 (не висит на 0.0.0.0 и не конфликтует с чужим :80).

services:
  nginx:
    ports:
      - "127.0.0.1:9080:80"
